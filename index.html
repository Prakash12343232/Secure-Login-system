<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Entry router for Secure Login System. Redirects immediately based on local session state.">
    <title>Secure Login System - Entry Router</title>
    
    <script>
        // Immediate client-side routing on page entry
        const activeSession = localStorage.getItem('active_session');
        if (activeSession) {
            window.location.href = 'dashboard.html';
        } else {
            window.location.href = 'login.html';
        }
    </script>
</head>
<body style="margin: 0; padding: 0; font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background-color: #f8fafc; color: #0f172a;">
    <div style="text-align: center;">
        <div style="font-size: 24px; margin-bottom: 12px; color: #0284c7;">
            <i class="fa-solid fa-spinner fa-spin" style="font-size: 32px;"></i>
        </div>
        <p style="font-size: 16px; font-weight: 600;">Verifying session integrity...</p>
    </div>
</body>
</html>
