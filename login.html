<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Secure Login terminal for static internship presentation.">
    <title>Sign In - Secure Login System</title>
    
    <!-- Premium Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Design System CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Popup Banners Injection Point -->
    <div class="alerts-container" id="alerts-container"></div>

    <!-- Navigation Header -->
    <header class="app-header">
        <nav class="navbar container">
            <a href="index.html" class="nav-logo">
                <i class="fa-solid fa-shield-halved logo-icon"></i>
                <span class="logo-text">SECURE<span class="logo-highlight">AUTH</span></span>
            </a>
            
            <ul class="nav-links" id="header-nav-links">
                <!-- Dynamically bound by script.js -->
                <li><a href="login.html" class="nav-item"><i class="fa-solid fa-lock"></i> Login</a></li>
                <li><a href="register.html" class="nav-item nav-btn-register"><i class="fa-solid fa-user-plus"></i> Register</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Container -->
    <main class="app-main container">
        <div class="auth-card-container fade-in">
            <div class="auth-card">
                <div class="auth-card-header">
                    <div class="header-logo-icon">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <h2>Welcome Back</h2>
                    <p>Enter details to open presentation workspace</p>
                </div>

                <!-- Static Form with LocalStorage validation handler -->
                <form class="auth-form" id="login-form" novalidate>
                    <!-- Username or Email Input -->
                    <div class="form-group">
                        <label for="username_or_email">Username or Email</label>
                        <div class="input-icon-wrapper">
                            <i class="fa-solid fa-user input-icon"></i>
                            <input type="text" id="username_or_email" class="form-control" placeholder="admin or admin@secureauth.com" required autocomplete="username">
                        </div>
                    </div>

                    <!-- Password Input -->
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-icon-wrapper">
                            <i class="fa-solid fa-key input-icon"></i>
                            <input type="password" id="password" class="form-control" placeholder="Password123!" required autocomplete="current-password">
                            <button type="button" class="password-toggle-btn" id="password-toggle" aria-label="Toggle password visibility">
                                <i class="fa-solid fa-eye eye-show"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Remember Option -->
                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox" id="remember">
                            <span class="checkbox-label">Remember Me</span>
                        </label>
                        <a href="#" class="forgot-password-link" onclick="showAlert('Demo settings: Please use Username: admin | Password: Password123!', 'info');">Forgot Password?</a>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary btn-block btn-submit" id="submit-btn">
                        <span class="btn-text"><i class="fa-solid fa-right-to-bracket"></i> Sign In</span>
                    </button>
                </form>

                <div class="auth-card-footer">
                    <p>Don't have an account? <a href="register.html" class="footer-link">Register here</a></p>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
        <div class="container footer-content">
            <p>&copy; 2026 SecureAuth Inc. Internship Presentation Prototype.</p>
            <div class="footer-badges">
                <span class="presentation-badge"><i class="fa-solid fa-box"></i> Static Presentation Mode</span>
                <span class="presentation-badge"><i class="fa-solid fa-database"></i> JS LocalStorage Database</span>
            </div>
        </div>
    </footer>

    <!-- Main Controller Script -->
    <script src="script.js"></script>
</body>
</html>
